# ==============================================================================
# Alpha Quantum — CI pipeline
# Tetik:  her PR + main/develop/23martclaude push
# Görev:  lint (ruff), type check (mypy), test (pytest), docker build smoke
# Süre:   ~5 dk (matrix paralelizasyonu olmadan)
# ==============================================================================
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - 23martclaude

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------------------------
  # 1) Lint, type, test — Python 3.11
  # ----------------------------------------------------------------------------
  lint-and-test:
    name: Lint + Type + Test (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Ruff
        run: ruff check . --output-format=github

      - name: Mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -q --tb=short

  # ----------------------------------------------------------------------------
  # 2) Docker build smoke — image build edilir + healthcheck doğrulanır
  # ----------------------------------------------------------------------------
  docker-build:
    name: Docker build & healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -f docker/Dockerfile -t alphaquantum:ci .

      - name: Run container (background)
        run: |
          docker run -d --name aq-ci \
            -e AQ_DATABASE_PATH=/data/alpha_quantum.db \
            -e AQ_JWT_SECRET=ci_secret_at_least_32_chars_for_jwt_signing \
            -e AQ_ENV=development \
            -e AQ_ENABLE_DEMO_USERS=false \
            -e AQ_MARKET_OFFLINE=true \
            -e AQ_MACRO_OFFLINE=true \
            -e AQ_WEB_OFFLINE=true \
            -p 8000:8000 alphaquantum:ci

      - name: Wait for healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/v1/health >/dev/null 2>&1; then
              echo "API is healthy after ${i}s"
              curl -s http://localhost:8000/api/v1/health
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy in 30s. Container logs:"
          docker logs aq-ci
          exit 1

      - name: Container logs (always)
        if: always()
        run: docker logs aq-ci || true

      - name: Stop & remove
        if: always()
        run: |
          docker stop aq-ci || true
          docker rm aq-ci || true
