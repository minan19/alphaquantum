name: Staging Redis Chaos Smoke

on:
  workflow_dispatch:

jobs:
  staging-redis-chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AQ_RUN_STAGING_REDIS_CHAOS: "true"
      AQ_TOXIPROXY_URL: http://127.0.0.1:8474
      AQ_CHAOS_REDIS_PROXY_NAME: aq_redis
      AQ_CHAOS_REDIS_PROXY_LISTEN: 0.0.0.0:8666
      AQ_CHAOS_REDIS_UPSTREAM: redis:6379
      AQ_CHAOS_REDIS_PROXY_URL: redis://127.0.0.1:8666/0
      AQ_CHAOS_REDIS_SOCKET_TIMEOUT_SECONDS: "1.0"
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      toxiproxy:
        image: shopify/toxiproxy:latest
        ports:
          - 8474:8474
          - 8666:8666

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Services
        run: |
          python - <<'PY'
          import os
          import time
          import redis
          from urllib import request

          redis_url = "redis://127.0.0.1:6379/0"
          redis_deadline = time.time() + 30
          while time.time() < redis_deadline:
              try:
                  client = redis.Redis.from_url(redis_url, decode_responses=True)
                  client.ping()
                  print("Redis ready")
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Redis did not become ready in time.")

          toxiproxy_url = os.environ["AQ_TOXIPROXY_URL"].rstrip("/")
          toxiproxy_deadline = time.time() + 30
          while time.time() < toxiproxy_deadline:
              try:
                  req = request.Request(f"{toxiproxy_url}/version", method="GET")
                  with request.urlopen(req, timeout=5) as response:
                      if response.status == 200:
                          print("Toxiproxy ready")
                          break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Toxiproxy did not become ready in time.")
          PY

      - name: Run Redis Toxiproxy Chaos Smoke
        run: |
          python scripts/staging_redis_toxiproxy_chaos.py
