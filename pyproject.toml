[tool.ruff]
# Mevcut kod tabanı yoğun şekilde `; ` ile çoklu-statement satır kullanıyor
# (örnek: `clauses.append("x = ?"); params.append(value)`). Bu, stilist bir
# tercih; semantik etki yok. Yine de güvenlik / sessiz hata türünden gerçek
# sorunları (unused imports, undefined names, vb.) yakalamak istiyoruz.

line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Strateji: sadece "gerçek bug" işaretleyicilerini tut. Stil/modernizasyon
# kontrolleri (B, UP, I) bilinçli olarak dışarıda — bu kod tabanı yıllarca
# bu kontroller olmadan yazılmış, hepsini şimdi açmak çığ gibi diff üretir.
# Modernizasyon ayrı sprint (S-377+): `ruff check --fix --select B,UP,I` ile
# tek seferde uygulanır.
select = [
    "F",   # pyflakes — unused imports/vars, undefined names (GERÇEK BUG)
    "E9",  # syntax errors only (E9xx grubu)
    "W6",  # invalid escape sequences (W605 gibi)
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "F841",  # unused-variable — testlerde "assign ama dokunma" zaman zaman
             # dokümantasyon amaçlı yapılır
]

[tool.mypy]
# F1.1 + F1.2 sprintlerinde temizlenen alanlar:
# - Tüm dict/list/Callable generic args düzeltildi (37 hata)
# - Tüm unused type:ignore temizlendi (6 hata)
# - _deps.py engine accessor'larına cast() eklendi (31 yer)
# - __init__.py lifespan + middleware annotations
# - security.py + kvkk.py cast() ile no-any-return temizlendi
# Cumulative: 88 strict error → 0 (--strict --ignore-missing-imports modunda)
#
# `strict = true` global olarak aktive edildi.
#
# Korunan istisnalar (pre-existing legacy debt, F2+ sprint için):
# - `arg-type`: SQLite cursor.lastrowid `int | None` cast'leri (yaygın)
# - `return-value`: _fetch return type uyumsuzlukları
# - `assignment`: bazı Pydantic field assignment'ları
# - `attr-defined`: bazı conditional attr access'ler
# - `misc`: Pydantic v2 stub eksikliği (BaseModel Any)
python_version = "3.11"
strict = true
ignore_missing_imports = true
no_error_summary = true
warn_unused_configs = true
disable_error_code = [
    "arg-type",
    "return-value",
    "assignment",
    "attr-defined",
    "misc",
]
