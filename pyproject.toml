[tool.ruff]
# Mevcut kod tabanı yoğun şekilde `; ` ile çoklu-statement satır kullanıyor
# (örnek: `clauses.append("x = ?"); params.append(value)`). Bu, stilist bir
# tercih; semantik etki yok. Yine de güvenlik / sessiz hata türünden gerçek
# sorunları (unused imports, undefined names, vb.) yakalamak istiyoruz.

line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Strateji: sadece "gerçek bug" işaretleyicilerini tut. Stil/modernizasyon
# kontrolleri (B, UP, I) bilinçli olarak dışarıda — bu kod tabanı yıllarca
# bu kontroller olmadan yazılmış, hepsini şimdi açmak çığ gibi diff üretir.
# Modernizasyon ayrı sprint (S-377+): `ruff check --fix --select B,UP,I` ile
# tek seferde uygulanır.
select = [
    "F",   # pyflakes — unused imports/vars, undefined names (GERÇEK BUG)
    "E9",  # syntax errors only (E9xx grubu)
    "W6",  # invalid escape sequences (W605 gibi)
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "F841",  # unused-variable — testlerde "assign ama dokunma" zaman zaman
             # dokümantasyon amaçlı yapılır
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_error_summary = true
warn_unused_configs = true
